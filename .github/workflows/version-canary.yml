name: Version (canary)

# Keeps apps/web and apps/api versioned in lockstep as an alpha prerelease
# while development happens on canary. Every push to canary either opens/
# updates a "Version Packages (alpha)" PR (when changesets are pending) or,
# once that PR is merged, is a no-op here (nothing to publish to a registry —
# release-master.yml handles the real, stable release when canary is promoted
# to master).

on:
  push:
    branches:
      - canary

concurrency:
  group: version-canary
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/db
          DIRECT_URL: postgresql://user:password@localhost:5432/db
          SKIP_ENV_VALIDATION: true
          HUSKY: 0
        run: bun install --frozen-lockfile

      - name: Version packages (alpha)
        uses: changesets/action@v1
        with:
          version: bun run ci:version
          title: "chore: version packages (alpha)"
          commit: "chore: version packages (alpha)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
