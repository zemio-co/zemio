name: Version (canary)

# web and api version independently from their own changesets (no "fixed"
# group, no alpha-prerelease cycle — see .changeset/config.json). Every push
# to canary either opens/updates a "Version Packages" PR with real, final
# version bumps (when changesets are pending) or, once that PR is merged, is a
# no-op here (nothing to publish to a registry — release-master.yml tags and
# releases whichever app(s) changed version once canary is promoted to
# master).

on:
  push:
    branches:
      - canary

concurrency:
  group: version-canary
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/db
          DIRECT_URL: postgresql://user:password@localhost:5432/db
          SKIP_ENV_VALIDATION: true
          HUSKY: 0
        run: bun install --frozen-lockfile

      - name: Version packages
        uses: changesets/action@v1
        with:
          version: bun run ci:version
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
