name: Build and Push Images

# Builds the web and api Docker images in CI and publishes them to the GitHub
# Container Registry. Railway deploys these prebuilt images instead of building
# from the Dockerfile, which lets us use BuildKit secrets for the Sentry
# source-map upload token (Railway's builder does not support secret mounts).
#
# Runs only on push to master (production) / canary (staging) / version tags —
# i.e. when a feature branch is merged into canary, or on release — never on
# feature-branch commits themselves. Each branch publishes a moving tag named
# after it (e.g. `canary`) plus the immutable per-commit SHA tag; `master`
# additionally publishes `latest`.

on:
  push:
    branches:
      - master
      - canary
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: web
            image: zemio-web
          - app: api
            image: zemio-api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          # Non-sensitive Sentry coordinates (consumed by the web image only;
          # ignored by the api image).
          build-args: |
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}
            SENTRY_URL=${{ secrets.SENTRY_URL }}
          # Sensitive token passed as a BuildKit secret (mounted only by the web
          # image's build step, never written to an image layer).
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}
