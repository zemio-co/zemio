name: Release (master)

# Fires when canary is promoted to master. web and api version independently
# via changesets (no alpha-prerelease cycle, no "fixed" group — see
# .changeset/config.json), so by the time a change reaches master its
# package.json version is already final: version-canary.yml already bumped it
# on canary and that bump carried over with the merge. This job just tags and
# releases whichever app(s) changed version — scripts/release-tag.mjs skips
# any app whose current version is already tagged.

on:
  push:
    branches:
      - master

concurrency:
  group: release-master
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/db
          DIRECT_URL: postgresql://user:password@localhost:5432/db
          SKIP_ENV_VALIDATION: true
          HUSKY: 0
        run: bun install --frozen-lockfile

      - name: Tag and publish release
        run: bun run ci:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
